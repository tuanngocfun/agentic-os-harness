profile_version: "2026-06-02"
profile_name: "mimo-v2.5pro-os-harness-profile"
project_phase: "boot_to_shell_proven_advanced_core_scaffold"
source_of_truth: true

format_policy:
  instructions: "markdown"
  machine_profile: "yaml"
  runtime_evidence: "jsonl"
  rendered_reports: "html"
  rule: "Instruction files stay concise Markdown; machine state stays YAML/JSONL; HTML is for rendered reports, not agent input contracts."

boot_profile:
  loader: "phase1_track_rolling_chs"
  kernel_sector_limit: 120
  kernel_load_address: "0x1000"
  artifacts:
    - "build/boot.bin"
    - "build/boot_config.inc"
    - "build/kernel.elf"
    - "build/kernel.bin"
    - "build/os.img"

markers:
  required_current:
    - "BOOT_OK"
    - "KERNEL_INIT_OK"
    - "SHELL_READY"
  optional:
    - "TESTS_PASS"
  failure:
    - "BOOT_DISK_ERROR"
    - "KERNEL_PANIC"

claim_status:
  bootloader: "claimable_with_make_test"
  protected_mode_entry: "claimable_with_make_test"
  serial_markers: "claimable_with_make_test"
  keyboard_irq: "claimable_with_shell_runtime_test"
  shell_help: "claimable_with_shell_runtime_test"
  timer_ticks: "claimable_with_timer_test"
  memory_info: "stubbed_not_claimable"
  paging: "partial_claimable_map_unmap_permission_bookkeeping_test"
  syscall: "claimable_with_syscall_test"
  exception_panic: "claimable_with_exception_test_suite"
  process: "not_claimable"
  scheduler: "partial_claimable_queue_rotation_test"
  user_mode: "not_claimable_no_ring3_transition_test"
  filesystem: "not_started"
  networking: "not_started"

fast_gates:
  - "make all"
  - "make test"
  - "bash harness-engineering/.agent/skills/regression-validation/scripts/check_harness_contract.sh"
  - "bash harness-engineering/.agent/skills/git-change-management/scripts/git_preflight.sh"
  - "git diff --check"

deep_gates:
  - "make test-deep"
  - "syscall_abi_proof"
  - "exception_panic_markers"
  - "scheduler_queue_rotation_proof"
  - "paging_map_unmap_permission_bookkeeping_test"
  - "timer_ticks_runtime_assertion"

pending_deep_gates:
  - "page_fault_negative_test"
  - "scheduler_context_switch_proof"
  - "paging_permission_fault_and_invalidation_test"
  - "memory_detection_runtime_test"
  - "process_user_mode_transition_test"
  - "shell_command_io_stable_test"

routes:
  harness_only:
    allowed_paths:
      - "AGENTS.md"
      - "harness-engineering/"
      - "scripts/*test*.sh"
    required_gates:
      - "check_harness_contract"
      - "git_preflight"
  bootloader:
    allowed_paths:
      - "boot/"
      - "Makefile"
      - "linker.ld"
      - "scripts/boot_test.sh"
      - "harness-engineering/03-os-harness-config/"
    required_gates:
      - "make all"
      - "make test"
      - "sector_count_check"
      - "early_qemu_exit_check"
  shell_runtime:
    allowed_paths:
      - "kernel/shell.c"
      - "kernel/keyboard.c"
      - "kernel/vga.c"
      - "include/shell.h"
      - "include/keyboard.h"
      - "include/vga.h"
      - "scripts/shell_test.sh"
    required_gates:
      - "make test"
      - "vga_shell_text_check"
  advanced_core:
    allowed_paths:
      - "kernel/idt.c"
      - "kernel/isr.asm"
      - "kernel/timer.c"
      - "kernel/syscall.c"
      - "kernel/process.c"
      - "kernel/scheduler.c"
      - "kernel/paging.c"
      - "kernel/tss.c"
      - "kernel/usermode.asm"
      - "include/"
      - "scripts/"
    required_gates:
      - "make all"
      - "make test"
      - "targeted_runtime_test_for_claimed_subsystem"
      - "panic_or_fault_evidence_for_negative_paths"

mimo_next_tasks:
  - id: "paging-permission-fault-and-invalidation"
    priority: "P1"
    success: "A targeted gate proves write-protection or user/supervisor enforcement with a structured page-fault marker, plus invalidation behavior; current paging gate proves only map/unmap plus permission-bit bookkeeping."
  - id: "scheduler-context-switch-proof"
    priority: "P1"
    success: "Timer-driven or explicit safe context-switch path proves at least two runnable contexts actually execute in expected order; current queue-rotation proof is not enough for this claim."
  - id: "memory-detection-proof"
    priority: "P1"
    success: "A runtime gate proves detected memory size/source rather than returning a stubbed constant."
  - id: "process-user-mode-proof"
    priority: "P1"
    success: "A targeted gate proves a real ring-3 transition or keeps process/user mode explicitly not claimable."
  - id: "shell-command-io-proof"
    priority: "P2"
    success: "A separate targeted gate proves argument-bearing shell commands such as echo, not default scripts/shell_test.sh; the proof must distinguish typed input from command output."

forbidden_next_breadth:
  - "filesystem"
  - "networking"
  - "more_shell_commands_without_tests"
  - "graphics_mode"
  - "marketing_docs_claiming_advanced_core_complete"

source_authority:
  - "harness-engineering/13-agent-routing-and-risk/README.md"
  - "harness-engineering/06-validation/README.md"
  - "harness-engineering/11-reference/README.md"
