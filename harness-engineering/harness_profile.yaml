profile_version: "2026-06-02"
profile_name: "mimo-v2.5pro-os-harness-profile"
project_phase: "boot_to_shell_proven_stage2_preemptive_memory_ramdisk_vfs_simplefs_file_syscalls_elf_loader_prep_process_syscall_elf_entry"
source_of_truth: true

format_policy:
  instructions: "markdown"
  machine_profile: "yaml"
  runtime_evidence: "jsonl"
  rendered_reports: "html"
  rule: "Instruction files stay concise Markdown; machine state stays YAML/JSONL; HTML is for rendered reports, not agent input contracts."

security_posture:
  claim: "known_red_team_attacks_blocked_security_not_complete"
  mode: "red_blue_regression_blocking"
  findings_log: "build/red-team/findings.jsonl"
  blocked_findings:
    - "RT-HARNESS-001"
    - "RT-EXEC-001"
    - "RT-FS-001"
    - "RT-FS-002"
    - "RT-EXEC-002"
    - "RT-ELF-001"
    - "RT-EXEC-003"
    - "RT-PROC-001"

boot_profile:
  loader: "stage2_lba_loader"
  stage2_reserved_sectors: 32
  kernel_lba_start: 33
  kernel_load_address: "0x1000"
  artifacts:
    - "build/boot.bin"
    - "build/stage2.bin"
    - "build/boot_config.inc"
    - "build/kernel.elf"
    - "build/kernel.bin"
    - "build/os.img"

markers:
  required_current:
    - "STAGE2_OK"
    - "BOOT_OK"
    - "KERNEL_INIT_OK"
    - "SHELL_READY"
  optional:
    - "TESTS_PASS"
  failure:
    - "BOOT_DISK_ERROR"
    - "KERNEL_PANIC"

claim_status:
  bootloader: "claimable_with_stage2_make_test"
  protected_mode_entry: "claimable_with_make_test"
  serial_markers: "claimable_with_make_test"
  keyboard_irq: "claimable_with_shell_runtime_test"
  shell_help: "claimable_with_shell_runtime_test"
  shell_echo: "claimable_with_shell_io_test"
  timer_ticks: "claimable_with_timer_test"
  memory_info: "claimable_with_e820_memory_detection_test"
  frame_allocator: "claimable_with_e820_frame_lifecycle_test"
  allocator: "claimable_with_allocator_runtime_test"
  paging: "claimable_with_map_fault_user_supervisor_and_address_space_tests"
  syscall: "claimable_with_syscall_ring3_negative_and_file_io_tests"
  exception_panic: "claimable_with_exception_test_suite"
  process: "claimable_with_user_process_record_ring3_entry_address_space_and_process_syscall_elf_entry_tests"
  scheduler: "claimable_with_scheduler_preemption_priority_fairness_tests"
  user_mode: "claimable_with_usermode_ring3_test"
  block_device: "claimable_with_ramdisk_runtime_test"
  filesystem: "claimable_with_vfs_simplefs_runtime_test"
  elf_loader: "claimable_with_vfs_elf_loader_prep_test"
  networking: "not_started"

fast_gates:
  - "make all"
  - "make test"
  - "bash harness-engineering/.agent/skills/regression-validation/scripts/check_harness_contract.sh"
  - "bash harness-engineering/.agent/skills/git-change-management/scripts/git_preflight.sh"
  - "git diff --check"

deep_gates:
  - "make test-deep"
  - "syscall_abi_proof"
  - "exception_panic_markers"
  - "scheduler_queue_rotation_and_explicit_context_switch_proof"
  - "paging_map_unmap_permission_fault_invalidation_test"
  - "paging_user_supervisor_isolation_test"
  - "memory_detection_runtime_test"
  - "e820_memory_map_test"
  - "frame_allocator_lifecycle_test"
  - "process_user_mode_transition_test"
  - "timer_ticks_runtime_assertion"
  - "timer_preemption_runtime_test"
  - "memory_allocator_runtime_test"
  - "process_address_space_isolation_test"
  - "paging_per_process_address_space_test"
  - "syscall_user_mode_negative_path_test"
  - "syscall_file_io_runtime_test"
  - "elf_loader_prep_runtime_test"
  - "process_syscall_elf_entry_transfer_test"
  - "scheduler_priority_fairness_safety_test"
  - "ramdisk_block_device_runtime_test"
  - "vfs_simplefs_runtime_test"
  - "shell_command_io_stable_test"

adversarial_gates:
  - "make test-red-team"
  - "make test-blue-team"

pending_deep_gates: []

routes:
  harness_only:
    allowed_paths:
      - "AGENTS.md"
      - "harness-engineering/"
      - "scripts/*test*.sh"
    required_gates:
      - "check_harness_contract"
      - "git_preflight"
  bootloader:
    allowed_paths:
      - "boot/"
      - "Makefile"
      - "linker.ld"
      - "scripts/boot_test.sh"
      - "harness-engineering/03-os-harness-config/"
    required_gates:
      - "make all"
      - "make test"
      - "sector_count_check"
      - "early_qemu_exit_check"
  shell_runtime:
    allowed_paths:
      - "kernel/shell.c"
      - "kernel/keyboard.c"
      - "kernel/vga.c"
      - "include/shell.h"
      - "include/keyboard.h"
      - "include/vga.h"
      - "scripts/shell_test.sh"
    required_gates:
      - "make test"
      - "vga_shell_text_check"
  advanced_core:
    allowed_paths:
      - "kernel/idt.c"
      - "kernel/isr.asm"
      - "kernel/timer.c"
      - "kernel/syscall.c"
      - "kernel/process.c"
      - "kernel/scheduler.c"
      - "kernel/paging.c"
      - "kernel/e820.c"
      - "kernel/elf.c"
      - "kernel/frame.c"
      - "kernel/memory.c"
      - "kernel/tss.c"
      - "kernel/usermode.asm"
      - "include/"
      - "scripts/"
    required_gates:
      - "make all"
      - "make test"
      - "targeted_runtime_test_for_claimed_subsystem"
      - "panic_or_fault_evidence_for_negative_paths"
  adversarial_red_team:
    allowed_paths:
      - "kernel/kernel.c"
      - "kernel/syscall.c"
      - "kernel/elf.c"
      - "kernel/paging.c"
      - "kernel/process.c"
      - "kernel/simplefs.c"
      - "kernel/vfs.c"
      - "include/elf.h"
      - "include/paging.h"
      - "include/vfs.h"
      - "include/syscall.h"
      - "scripts/red_team_test.sh"
      - "harness-engineering/red-team/"
      - "harness-engineering/blue-team/"
      - "harness-engineering/harness_profile.yaml"
    required_gates:
      - "make all"
      - "make test-red-team"
      - "make test-blue-team"
      - "check_harness_contract"

mimo_next_tasks:
  - id: "red-blue-fuzz-expansion"
    priority: "P0"
    success: "Add the next adversarial probes for syscall fuzzing and scheduler/preemption race surfaces while keeping normal functional gates green."
  - id: "fork-wait-exec-replacement-hardening"
    priority: "P0"
    success: "Implement true fork child-return semantics, zombie wait/reap coverage, and exec address-space replacement with targeted runtime gates."

forbidden_next_breadth:
  - "networking"
  - "more_shell_commands_without_tests"
  - "graphics_mode"
  - "marketing_docs_claiming_advanced_core_complete"

source_authority:
