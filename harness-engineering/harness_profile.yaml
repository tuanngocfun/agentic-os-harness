profile_version: "2026-06-02"
profile_name: "mimo-v2.5pro-os-harness-profile"
project_phase: "boot_to_shell_proven_advanced_core_scaffold"
source_of_truth: true

format_policy:
  instructions: "markdown"
  machine_profile: "yaml"
  runtime_evidence: "jsonl"
  rendered_reports: "html"
  rule: "Instruction files stay concise Markdown; machine state stays YAML/JSONL; HTML is for rendered reports, not agent input contracts."

boot_profile:
  loader: "phase1_bios_geometry_chs"
  kernel_sector_limit: 120
  kernel_load_address: "0x1000"
  artifacts:
    - "build/boot.bin"
    - "build/boot_config.inc"
    - "build/kernel.elf"
    - "build/kernel.bin"
    - "build/os.img"

markers:
  required_current:
    - "BOOT_OK"
    - "KERNEL_INIT_OK"
    - "SHELL_READY"
  optional:
    - "TESTS_PASS"
  failure:
    - "BOOT_DISK_ERROR"
    - "KERNEL_PANIC"

claim_status:
  bootloader: "claimable_with_make_test"
  protected_mode_entry: "claimable_with_make_test"
  serial_markers: "claimable_with_make_test"
  keyboard_irq: "claimable_with_shell_runtime_test"
  shell_help: "claimable_with_shell_runtime_test"
  shell_echo: "claimable_with_shell_io_test"
  timer_ticks: "claimable_with_timer_test"
  memory_info: "claimable_with_memory_detection_test"
  paging: "partial_claimable_map_unmap_permission_fault_invalidation_user_supervisor_test"
  syscall: "claimable_with_syscall_test"
  exception_panic: "claimable_with_exception_test_suite"
  process: "partial_claimable_user_process_record_ring3_entry_test"
  scheduler: "claimable_with_scheduler_explicit_context_switch_test"
  user_mode: "claimable_with_usermode_ring3_test"
  filesystem: "not_started"
  networking: "not_started"

fast_gates:
  - "make all"
  - "make test"
  - "bash harness-engineering/.agent/skills/regression-validation/scripts/check_harness_contract.sh"
  - "bash harness-engineering/.agent/skills/git-change-management/scripts/git_preflight.sh"
  - "git diff --check"

deep_gates:
  - "make test-deep"
  - "syscall_abi_proof"
  - "exception_panic_markers"
  - "scheduler_queue_rotation_and_explicit_context_switch_proof"
  - "paging_map_unmap_permission_fault_invalidation_test"
  - "paging_user_supervisor_isolation_test"
  - "memory_detection_runtime_test"
  - "process_user_mode_transition_test"
  - "timer_ticks_runtime_assertion"
  - "shell_command_io_stable_test"

pending_deep_gates:
  - "scheduler_timer_preemption_proof"
  - "process_address_space_isolation_test"
  - "memory_allocator_runtime_test"
  - "paging_per_process_address_space_test"
  - "syscall_user_mode_negative_path_test"

routes:
  harness_only:
    allowed_paths:
      - "AGENTS.md"
      - "harness-engineering/"
      - "scripts/*test*.sh"
    required_gates:
      - "check_harness_contract"
      - "git_preflight"
  bootloader:
    allowed_paths:
      - "boot/"
      - "Makefile"
      - "linker.ld"
      - "scripts/boot_test.sh"
      - "harness-engineering/03-os-harness-config/"
    required_gates:
      - "make all"
      - "make test"
      - "sector_count_check"
      - "early_qemu_exit_check"
  shell_runtime:
    allowed_paths:
      - "kernel/shell.c"
      - "kernel/keyboard.c"
      - "kernel/vga.c"
      - "include/shell.h"
      - "include/keyboard.h"
      - "include/vga.h"
      - "scripts/shell_test.sh"
    required_gates:
      - "make test"
      - "vga_shell_text_check"
  advanced_core:
    allowed_paths:
      - "kernel/idt.c"
      - "kernel/isr.asm"
      - "kernel/timer.c"
      - "kernel/syscall.c"
      - "kernel/process.c"
      - "kernel/scheduler.c"
      - "kernel/paging.c"
      - "kernel/tss.c"
      - "kernel/usermode.asm"
      - "include/"
      - "scripts/"
    required_gates:
      - "make all"
      - "make test"
      - "targeted_runtime_test_for_claimed_subsystem"
      - "panic_or_fault_evidence_for_negative_paths"

mimo_next_tasks:
  - id: "scheduler-timer-preemption-proof"
    priority: "P1"
    success: "A targeted gate wires PIT timer delivery into scheduling and proves preemptive task execution without relying on cooperative yield only."
  - id: "process-address-space-isolation-proof"
    priority: "P1"
    success: "A targeted gate proves separate process address spaces cannot read or write each other through user-mode mappings."
  - id: "memory-allocator-proof"
    priority: "P1"
    success: "A runtime gate proves frame allocation/free behavior and exhaustion handling against the detected memory source."
  - id: "paging-per-process-address-space-proof"
    priority: "P2"
    success: "A targeted gate proves per-process page directories or equivalent isolation, not only a single global page table."
  - id: "syscall-user-mode-negative-path-proof"
    priority: "P2"
    success: "A ring-3 syscall gate proves valid user syscalls and invalid syscall numbers/arguments return controlled errors without kernel panic."

forbidden_next_breadth:
  - "filesystem"
  - "networking"
  - "more_shell_commands_without_tests"
  - "graphics_mode"
  - "marketing_docs_claiming_advanced_core_complete"

source_authority:
  - "harness-engineering/13-agent-routing-and-risk/README.md"
  - "harness-engineering/06-validation/README.md"
  - "harness-engineering/11-reference/README.md"
